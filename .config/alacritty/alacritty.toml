# Настройки окна
[window]
padding = { x = 16, y = 16 }
dynamic_title = true
opacity = 0.9 # Небольшая прозрачность для стиля

[scrolling]
history = 10000

# Настройки шрифта (замените на свои, если установлены другие)
[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 9

# Цветовая схема Nord
[colors.primary]
background = "#2e3440" # Тот самый базовый цвет
foreground = "#d8dee9"
dim_foreground = "#a3be8c"

[colors.cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.normal]
black   = "#3b4252"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"

[colors.bright]
black   = "#4c566a"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#8fbcbb"
white   = "#eceff4"

[colors.selection]
text = "CellForeground"
background = "#4c566a"
